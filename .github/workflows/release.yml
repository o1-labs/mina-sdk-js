name: Release

# Publishes the package to npm when a GitHub Release is published.
#
# Trusted publishing: register this workflow on npmjs.com under the
# `mina-sdk` package settings — Trusted Publisher → GitHub Actions →
# repository `MinaProtocol/mina-sdk-js`, workflow `release.yml`, env
# `npm`. Once registered, no NPM_TOKEN is needed; the OIDC `id-token`
# claim authenticates the publish step.
#
# First publish must be done manually once to register the package
# under the publishing org.

on:
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm test
      - run: npm run typecheck

  publish:
    runs-on: ubuntu-latest
    needs: test
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Verify package.json version matches the release tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "package.json version ($PKG_VERSION) does not match release tag ($TAG)" >&2
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --provenance --access public
